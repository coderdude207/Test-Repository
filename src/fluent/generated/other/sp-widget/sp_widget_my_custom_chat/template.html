<div class="llm-chat-container">
  <div class="chat-messages" ng-ref="ctrl.messagesEl">
    <div class="message" ng-repeat="msg in data.messages" ng-class="msg.role">
      <div class="avatar">{{msg.role === 'user' ? '👤' : '🤖'}}</div>
      <div class="bubble">
        <span ng-bind-html="msg.html || msg.content"></span>
        <span class="cursor" ng-show="msg.streaming">▋</span>
      </div>
    </div>
    <div class="thinking" ng-show="data.isStreaming && !data.streamingStarted">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea
      ng-model="data.userInput"
      placeholder="Ask me anything..."
      ng-keydown="c.handleKeydown($event)"
      ng-disabled="data.isStreaming"
      rows="1"
      auto-grow>
    </textarea>
    <button ng-click="c.sendMessage()" ng-disabled="data.isStreaming || !data.userInput.trim()">
      <span ng-if="!data.isStreaming">Send</span>
      <span ng-if="data.isStreaming" ng-click="c.stopStreaming()">■ Stop</span>
    </button>
  </div>
</div>
